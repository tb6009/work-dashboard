<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 40 600 550" font-family="&#39;Avenir Next&#39;, &#39;Mulish&#39;, system-ui, -apple-system, sans-serif">
  <defs>
    
  </defs>

  
  <text class="hd-section" x="80" y="115">Type</text>
